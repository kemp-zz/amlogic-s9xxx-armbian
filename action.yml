name: "Compile release general kernel"
description: "Compile kernel for Amlogic, Rockchip and Allwinner boxes"
inputs:
  kernel_version:
    description: "Select kernel version"
    required: false
    default: "5.15.162"
  kernel_auto:
    description: "Auto use the latest kernel"
    required: false
    default: "false"
  kernel_package:
    description: "Select compile package list"
    required: false
    default: "all"
  kernel_toolchain:
    description: "Select the compilation toolchain"
    required: false
    default: "gcc"
  kernel_sign:
    description: "Set the kernel custom signature"
    required: false
    default: "-1-7d9483ff60109a7caf36266e8917014e"
  kernel_config:
    description: "Set the path of kernel .config"
    required: false
    default: "kernel-config/release/general"
  compress_format:
    description: "Set the initrd compression format"
    required: false
    default: "xz"

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      shell: bash
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo swapoff -a
        sudo rm -f /swapfile /mnt/swapfile
        docker rmi $(docker images -q) 2>/dev/null
        sudo rm -rf "${AGENT_TOOLSDIRECTORY}" /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android 2>/dev/null
        sudo -E apt-get -y update
        sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
        sudo -E apt-get -y install $(curl -fsSL https://is.gd/depend_ubuntu2204_armbian)
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get clean
        sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
        sudo rm -rf ~/{.cargo,.dotnet,.rustup}
        sudo timedatectl set-timezone "${TZ}"
        echo "Disk usage before setup:"
        df -h

    - name: Create simulated physical disk
      shell: bash
      run: |
        mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
        root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
        sudo truncate -s "${mnt_size}"G /mnt/mnt.img
        sudo truncate -s "${root_size}"G /root.img
        sudo losetup /dev/loop6 /mnt/mnt.img
        sudo losetup /dev/loop7 /root.img
        sudo pvcreate /dev/loop6
        sudo pvcreate /dev/loop7
        sudo vgcreate github /dev/loop6 /dev/loop7
        sudo lvcreate -n runner -l 100%FREE github
        sudo mkfs.xfs /dev/github/runner
        sudo mkdir -p /builder
        sudo mount /dev/github/runner /builder
        sudo chown -R runner.runner /builder
        df -Th

    - name: Create a mapped directory
      shell: bash
      working-directory: /builder
      run: |
        df -hT ${PWD}
        mkdir -p /builder/{kernel,output}
        ln -sf /builder/kernel /home/runner/work/_actions/kemp-zz/amlogic-s9xxx-armbian/main/compile-kernel/kernel
        ln -sf /builder/output /home/runner/work/_actions/kemp-zz/amlogic-s9xxx-armbian/main/compile-kernel/output

    - name: Compile Kernel
      shell: bash
      run: |
        cd /home/runner/work/_actions/kemp-zz/amlogic-s9xxx-armbian/main
        echo "Start compile kernel..."
        
        # Download kernel source
        git clone --depth 1 https://github.com/unifreq/linux-5.15.y.git -b main kernel-source
        cd kernel-source
        git fetch --depth=1 origin 244dce52c74abd24de772a07f83522493c888412
        git checkout FETCH_HEAD
        
        # Prepare compilation command
        make_command=""
        make_command="${make_command} -k ${{ inputs.kernel_version }}"
        make_command="${make_command} -a ${{ inputs.kernel_auto }}"
        make_command="${make_command} -p ${{ inputs.kernel_package }}"
        make_command="${make_command} -n ${{ inputs.kernel_sign }}"
        make_command="${make_command} -t ${{ inputs.kernel_toolchain }}"
        make_command="${make_command} -c ${{ inputs.compress_format }}"
        
        # Execute compilation
        sudo -E ./recompile ${make_command}
        
        echo "Kernel compilation completed."
        echo "Disk usage after compilation:"
        df -h

    - name: Upload Kernel
      uses: actions/upload-artifact@v3
      with:
        name: compiled-kernel
        path: /home/runner/work/_actions/kemp-zz/amlogic-s9xxx-armbian/main/compile-kernel/output

branding:
  icon: "cpu"
  color: "green"
